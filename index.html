<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="weather-bg" class="weather-bg"></div>

  <div id="sidebar" class="sidebar collapsed">
    <div class="sidebar-header">
      <h2>Saved Cities</h2>
      <button class="toggle-sidebar-btn" onclick="toggleSidebar()" aria-label="Toggle Menu">☰</button>
    </div>
    <ul id="saved-list" class="saved-list"></ul>
  </div>

  <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

  <div id="main-content" class="main-content collapsed">
    <header class="app-header">
      <button class="toggle-sidebar-btn desktop-toggle" onclick="toggleSidebar()" aria-label="Toggle Menu">☰</button>
      <h1>Weather App</h1>
      <div class="weather-input">
        <input type="text" id="city" placeholder="Search for city..." oninput="debounceAutocomplete()"
          onkeydown="handleCityKeydown(event)" autocomplete="off" />
        <ul id="autocomplete-list" class="autocomplete-list"></ul>
        <button onclick="getWeather()">Get Weather</button>
        <label class="unit-toggle">
          <input type="checkbox" id="unit-toggle" onchange="toggleUnit()" />
          <span class="slider"></span>
          <span class="unit-label">°C / °F</span>
        </label>
      </div>
    </header>

    <main class="top-grid">
      <section class="weather-card" id="weather-info"></section>
      <section class="map-card">
        <h3>City Location</h3>
        <div id="map"></div>
      </section>
      <section class="forecast-card">
        <h3>Next 6 Hours</h3>
        <div id="hourly-forecast" class="hourly-grid"></div>
      </section>
    </main>

    <section class="forecast-card" id="forecast"></section>

    <div class="footer-tools">
      <button onclick="saveCity()" aria-label="Save">💾 Save</button>
      <button onclick="shareWeather()" aria-label="Share">🔗 Share</button>
      <span id="last-updated"></span>
    </div>

    <div id="loader" class="loader" style="display: none"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>

</html>
